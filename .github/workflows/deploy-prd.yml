name: Deploy Prd

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 4"

permissions: {}

concurrency:
  group: ${{ github.workflow }}

jobs:
  detect-changes:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
      terraform: ${{ steps.changes.outputs.terraform }}
    steps:
      - id: changes
        uses: frasermolyneux/actions/detect-changes@main
        with:
          filters: |
            src:src/**
            terraform:terraform/**

  terraform-state-check-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    runs-on: ubuntu-latest
    outputs:
      has_resources: ${{ steps.state-check.outputs.has_resources }}
      state_tainted: ${{ steps.state-check.outputs.state_tainted }}
    steps:
      - id: state-check
        uses: frasermolyneux/actions/terraform-state-check@terraform-state-check/v1.1
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  build-and-test:
    needs:
      - detect-changes
      - terraform-state-check-dev
    if: |
      !failure() && !cancelled() && (needs.detect-changes.outputs.src == 'true' || needs.terraform-state-check-dev.outputs.state_tainted == 'true')
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - id: funcapp-ci
        uses: frasermolyneux/actions/dotnet-web-ci@dotnet-web-ci/v1.4
        with:
          dotnet-project: "MX.Platform.Notifications.FuncApp"
          dotnet-version: |
            9.0.x
            10.0.x
          src-folder: "src"

    outputs:
      build_version: ${{ steps.funcapp-ci.outputs.build_version }}

  terraform-plan-and-apply-dev:
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true' || needs.terraform-state-check-dev.outputs.state_tainted == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true' && needs.terraform-state-check-dev.outputs.state_tainted != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/dev.tfvars"
          terraform-backend-file: "backends/dev.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output-dev
        shell: bash
        run: |
          cd terraform
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_name=$(terraform output -raw api_management_name)" >> $GITHUB_OUTPUT
          echo "api_management_resource_group_name=$(terraform output -raw api_management_resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_product_id=$(terraform output -raw api_management_product_id)" >> $GITHUB_OUTPUT
          echo "api_version_set_id=$(terraform output -raw api_version_set_id)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

    outputs:
      function_app_name: ${{ steps.terraform-output-dev.outputs.function_app_name }}
      resource_group_name: ${{ steps.terraform-output-dev.outputs.resource_group_name }}
      api_management_name: ${{ steps.terraform-output-dev.outputs.api_management_name }}
      api_management_resource_group_name: ${{ steps.terraform-output-dev.outputs.api_management_resource_group_name }}
      api_management_product_id: ${{ steps.terraform-output-dev.outputs.api_management_product_id }}
      api_version_set_id: ${{ steps.terraform-output-dev.outputs.api_version_set_id }}

  deploy-funcapp-dev:
    if: |
      !failure() && !cancelled() && github.event_name != 'schedule' && (needs.detect-changes.outputs.src == 'true' || needs.terraform-state-check-dev.outputs.state_tainted == 'true')
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: frasermolyneux/actions/deploy-function-app@deploy-function-app/v1.2
        with:
          function-app-artifact-name: "MX.Platform.Notifications.FuncApp"
          function-app-name: ${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}
          function-app-resource-group: ${{ needs.terraform-plan-and-apply-dev.outputs.resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  apim-api-import-dev:
    if: |
      !failure() && !cancelled() && github.event_name != 'schedule' && (needs.detect-changes.outputs.src == 'true' || needs.terraform-state-check-dev.outputs.state_tainted == 'true')
    permissions:
      contents: read
      id-token: write
    environment: Development
    needs:
      - detect-changes
      - terraform-state-check-dev
      - build-and-test
      - terraform-plan-and-apply-dev
      - deploy-funcapp-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-dev
    steps:
      - uses: frasermolyneux/actions/apim-api-import@apim-api-import/v1.0
        with:
          api-id: "notifications-api-v1"
          api-display-name: "Notifications API"
          api-path: "notifications"
          api-version: "v1"
          api-version-set-id: ${{ needs.terraform-plan-and-apply-dev.outputs.api_version_set_id }}
          specification-url: "https://${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}.azurewebsites.net/api/openapi/v1.json"
          service-url: "https://${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}.azurewebsites.net/api"
          apim-name: ${{ needs.terraform-plan-and-apply-dev.outputs.api_management_name }}
          apim-resource-group: ${{ needs.terraform-plan-and-apply-dev.outputs.api_management_resource_group_name }}
          product-id: ${{ needs.terraform-plan-and-apply-dev.outputs.api_management_product_id }}
          subscription-required: "true"
          info-url: "https://${{ needs.terraform-plan-and-apply-dev.outputs.function_app_name }}.azurewebsites.net/api/v1/info"
          expected-version: ${{ needs.build-and-test.outputs.build_version }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  terraform-plan-and-apply-prd:
    if: |
      !failure() && !cancelled() && (needs.terraform-plan-and-apply-dev.result == 'success' || github.event_name == 'schedule')
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - terraform-plan-and-apply-dev
      - deploy-funcapp-dev
      - apim-api-import-dev
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - if: needs.detect-changes.outputs.terraform == 'true'
        uses: frasermolyneux/actions/terraform-plan-and-apply@terraform-plan-and-apply/v1.4
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - if: needs.detect-changes.outputs.terraform != 'true'
        uses: frasermolyneux/actions/terraform-output@terraform-output/v1.0
        with:
          terraform-folder: "terraform"
          terraform-var-file: "tfvars/prd.tfvars"
          terraform-backend-file: "backends/prd.backend.hcl"
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - id: terraform-output-prd
        shell: bash
        run: |
          cd terraform
          echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_name=$(terraform output -raw api_management_name)" >> $GITHUB_OUTPUT
          echo "api_management_resource_group_name=$(terraform output -raw api_management_resource_group_name)" >> $GITHUB_OUTPUT
          echo "api_management_product_id=$(terraform output -raw api_management_product_id)" >> $GITHUB_OUTPUT
          echo "api_version_set_id=$(terraform output -raw api_version_set_id)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_USE_AZUREAD: true
          ARM_USE_OIDC: true

    outputs:
      function_app_name: ${{ steps.terraform-output-prd.outputs.function_app_name }}
      resource_group_name: ${{ steps.terraform-output-prd.outputs.resource_group_name }}
      api_management_name: ${{ steps.terraform-output-prd.outputs.api_management_name }}
      api_management_resource_group_name: ${{ steps.terraform-output-prd.outputs.api_management_resource_group_name }}
      api_management_product_id: ${{ steps.terraform-output-prd.outputs.api_management_product_id }}
      api_version_set_id: ${{ steps.terraform-output-prd.outputs.api_version_set_id }}

  deploy-funcapp-prd:
    if: |
      !failure() && !cancelled() && needs.terraform-plan-and-apply-prd.result == 'success' && needs.detect-changes.outputs.src == 'true'
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-prd
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - uses: frasermolyneux/actions/deploy-function-app@deploy-function-app/v1.2
        with:
          function-app-artifact-name: "MX.Platform.Notifications.FuncApp"
          function-app-name: ${{ needs.terraform-plan-and-apply-prd.outputs.function_app_name }}
          function-app-resource-group: ${{ needs.terraform-plan-and-apply-prd.outputs.resource_group_name }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

  apim-api-import-prd:
    if: |
      !failure() && !cancelled() && needs.terraform-plan-and-apply-prd.result == 'success' && needs.detect-changes.outputs.src == 'true'
    permissions:
      contents: read
      id-token: write
    environment: Production
    needs:
      - detect-changes
      - build-and-test
      - terraform-plan-and-apply-prd
      - deploy-funcapp-prd
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.repository }}-prd
    steps:
      - uses: frasermolyneux/actions/apim-api-import@apim-api-import/v1.0
        with:
          api-id: "notifications-api-v1"
          api-display-name: "Notifications API"
          api-path: "notifications"
          api-version: "v1"
          api-version-set-id: ${{ needs.terraform-plan-and-apply-prd.outputs.api_version_set_id }}
          specification-url: "https://${{ needs.terraform-plan-and-apply-prd.outputs.function_app_name }}.azurewebsites.net/api/openapi/v1.json"
          service-url: "https://${{ needs.terraform-plan-and-apply-prd.outputs.function_app_name }}.azurewebsites.net/api"
          apim-name: ${{ needs.terraform-plan-and-apply-prd.outputs.api_management_name }}
          apim-resource-group: ${{ needs.terraform-plan-and-apply-prd.outputs.api_management_resource_group_name }}
          product-id: ${{ needs.terraform-plan-and-apply-prd.outputs.api_management_product_id }}
          subscription-required: "true"
          info-url: "https://${{ needs.terraform-plan-and-apply-prd.outputs.function_app_name }}.azurewebsites.net/api/v1/info"
          expected-version: ${{ needs.build-and-test.outputs.build_version }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
